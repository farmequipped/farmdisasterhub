<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="A reliable prediction service for natural disasters">
    <meta name="keywords" content="natural disaster prediction, machine learning, AI, weather forecasting">
    <meta name="author" content="Dominik Honzak">
    
    <!-- Open Graph Meta Tags for social media -->
    <meta property="og:title" content="FarmDisasterHub">
    <meta property="og:description" content="A reliable prediction service for natural disasters">
    <meta property="og:image" content="../pics/placeholder.jpg">
    <meta property="og:type" content="website">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="../pics/placeholder.jpg">
    <meta name="twitter:title" content="FarmDisasterHub">
    <meta name="twitter:description" content="A reliable prediction service for natural disasters">
    <meta name="twitter:image" content="../pics/placeholder.jpg">
    
    <title>FarmDisasterHub</title>
    
    <!-- Link to favicon -->
    <link rel="icon" href="../pics/icon.png">
    
    <!-- Link to external stylesheets (CSS) -->
    <link rel="stylesheet" href="../css/setup.css">

</head>
<body>
    <div class="tab show">Loading...</div>
    <div class="tab">
        <h3>Welcome to Farm Disaster Hub</h3>
        <button onclick="tab(2);">Setup Server</button>
        <button onclick="tab(3);">Email Alerts</button>
        <button onclick="location.href='/home';">Go to Dashboard</button>
    </div>
    <div id="setup" class="tab">
        <h2>Setup Server</h2>
        <h4>Detected (<span id="serverNumber"></span>) Servers Running</h4>
        <input type="text" id="serverIdInput" placeholder="Enter Server ID (e.g., East Side of Farm)">
        <input type="email" id="emailAddon" placeholder="Enter your email for alerts" />
        <button id="startServerBtn">Enable Server</button>
    </div>
    <div id="emails" class="tab">
        <h2>Email Alerts</h2>
        <h4>Current Emails</h4>
        <div id="currentEmails">None</div>
        <br>
        <input type="email" id="email" placeholder="Enter your email for alerts" />
        <button id="addEmailBtn">Add Email</button>
    </div>
    
    <!-- Link to external JavaScript file -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="../js/setup.js"></script>
</body>
</html>
